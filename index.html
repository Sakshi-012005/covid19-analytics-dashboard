<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next-Level COVID Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
<button id="darkModeBtn" class="btn btn-secondary">Toggle Dark Mode</button>

<div class="container my-4">
    <h1 class="mb-4 text-center">"COVID-19 Analytics Dashboard: Real-Time Data Visualization and Insights"</h1>

    <div id="globalStats" class="row mb-4"></div>

    <div class="row mb-4">
        <div class="col-lg-8 mb-3">
            <div id="map" style="height:500px;"></div>
            <div class="form-check form-switch mt-2">
                <input class="form-check-input" type="checkbox" id="toggleMapMetric">
                <label class="form-check-label" for="toggleMapMetric">Toggle Map Metric: Cases / Vaccinations</label>
            </div>
        </div>

        <div class="col-lg-4">
            <input type="text" id="countrySearch" class="form-control mb-3" placeholder="Search country...">
            <select id="countrySelector" class="form-select mb-3">
                <option value="">Select a country</option>
            </select>
            <div id="countryStats"></div>
            <div id="topBottomTables"></div>
        </div>
    </div>

    <div class="mb-4">
        <canvas id="timeSeriesChart" style="height:350px"></canvas>
    </div>
    <div class="mb-4">
        <canvas id="historicalChart" style="height:300px"></canvas>
    </div>
    <div class="mb-4">
        <canvas id="efficiencyChart" style="height:300px"></canvas>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
